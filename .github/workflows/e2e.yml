name: E2E Tests

# Promotion flow this repo follows: dev -> staging -> live.
#
# - Every push to dev/staging runs the full E2E suite, so each branch has
#   its own up-to-date pass/fail status.
# - Every PR into staging or live re-runs the suite against the merge
#   commit.
# - A PR into live is additionally gated: it must come from staging, and
#   staging's own last push-triggered run must have been green. This only
#   makes staging's status *checkable* here — GitHub won't actually block
#   the merge button on it unless "E2E / Playwright E2E" and
#   "E2E / Require staging -> live promotion rules" are also added as
#   required status checks in the live branch's protection rules.
on:
  push:
    branches:
      - dev
      - staging
  pull_request:
    branches:
      - staging
      - live

permissions:
  contents: read
  actions: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          EMAIL_TEST_MODE: "true"
        run: npm run test:e2e

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7

  gate-staging-promotion:
    name: Require dev -> staging promotion rules
    needs: e2e
    if: github.event_name == 'pull_request' && github.base_ref == 'staging'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Require PR source branch to be dev
        if: github.head_ref != 'dev'
        run: |
          echo "::error::PRs into 'staging' must come from 'dev' (this PR is from '${{ github.head_ref }}')."
          exit 1

      - name: Require dev's latest run to have passed
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "e2e.yml",
              branch: "dev",
              event: "push",
              status: "completed",
              per_page: 1,
            });

            const run = data.workflow_runs[0];
            if (!run) {
              core.setFailed(
                "No completed E2E run found for the dev branch — push to dev (or merge into it) before promoting to staging.",
              );
              return;
            }
            if (run.conclusion !== "success") {
              core.setFailed(
                `Latest dev run (#${run.run_number}, ${run.html_url}) did not pass (conclusion: ${run.conclusion}). Fix dev before promoting to staging.`,
              );
              return;
            }
            core.info(`dev is green: run #${run.run_number} succeeded (${run.html_url}).`);

  gate-live-promotion:
    name: Require staging -> live promotion rules
    needs: e2e
    if: github.event_name == 'pull_request' && github.base_ref == 'live'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Require PR source branch to be staging
        if: github.head_ref != 'staging'
        run: |
          echo "::error::PRs into 'live' must come from 'staging' (this PR is from '${{ github.head_ref }}')."
          exit 1

      - name: Require staging's latest run to have passed
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "e2e.yml",
              branch: "staging",
              event: "push",
              status: "completed",
              per_page: 1,
            });

            const run = data.workflow_runs[0];
            if (!run) {
              core.setFailed(
                "No completed E2E run found for the staging branch — push to staging (or merge into it) before promoting to live.",
              );
              return;
            }
            if (run.conclusion !== "success") {
              core.setFailed(
                `Latest staging run (#${run.run_number}, ${run.html_url}) did not pass (conclusion: ${run.conclusion}). Fix staging before promoting to live.`,
              );
              return;
            }
            core.info(`staging is green: run #${run.run_number} succeeded (${run.html_url}).`);
